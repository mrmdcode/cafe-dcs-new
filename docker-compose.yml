name: cafe-dcs-app

services:

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: cafe-dcs-app:v1
    container_name: cafe-app-production
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/.env.docker:/var/www/.env
    networks:
      - app-network
    depends_on:
      - mysql

  nginx:
    image: docker.arvancloud.ir/nginx:stable-alpine
    container_name: cafe_dcs_nginx_server
    restart: unless-stopped
    ports:
      - "8001:80"

    volumes:
      - ./src:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: cafe_dcs_mysql_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: uftF7dp993dXtImDIrsh
      MYSQL_PASSWORD: fYMwGNet72G9p7jjeL3A
      MYSQL_USER: laravel
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cafe_dcs_phpmyadmin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"

    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - app-network


networks:
  app-network:
    driver: bridge
    enable_ipv6: false

volumes:
  mysql-data:
    name: cafe-dcs-v2_mysql-data
